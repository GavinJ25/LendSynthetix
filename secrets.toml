# ─────────────────────────────────────────────────────────────────────
# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────
# Streamlit reads this automatically — no import needed.
# Access in app.py via:  st.secrets["LANGFLOW_API_KEY"]
#
# HOW TO GET YOUR LANGFLOW API KEY:
#   1. Go to https://astra.datastax.com
#   2. Log in → open your Langflow project
#   3. Click your profile avatar (top right) → "API Keys"
#   4. Click "Generate API Key" → copy the full token
#   5. Paste it below (include the "AstraCS:..." prefix)
#
# HOW TO GET YOUR FLOW ID:
#   1. Open your flow in Langflow Cloud
#   2. Look at the URL:
#      https://astra.datastax.com/langflow/...flows/<FLOW_ID>
#   3. Copy the UUID after "flows/" — looks like:
#      xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#
# NEVER commit this file. It is in .gitignore.
# Share .env.example with teammates instead.
# ─────────────────────────────────────────────────────────────────────

# ── Langflow / DataStax Astra ────────────────────────────────────────
LANGFLOW_API_KEY  = "AstraCS:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
LANGFLOW_FLOW_ID  = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
LANGFLOW_BASE_URL = "https://api.langflow.astra.datastax.com"

# ── OpenAI (used inside your Langflow agent nodes) ───────────────────
# HOW TO GET: https://platform.openai.com/api-keys → Create new key
OPENAI_API_KEY = "sk-proj-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── HuggingFace (optional — only if using open-source LLMs) ─────────
# HUGGINGFACE_API_KEY = "hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# ── BioSentinel (uncomment when LSTM model is trained) ───────────────
# BIOSENTINEL_MODEL_PATH  = "biosentinel/saved_model/biosentinel_lstm.h5"
# BIOSENTINEL_SCALER_PATH = "biosentinel/saved_model/scaler.pkl"

# ── App Behaviour ────────────────────────────────────────────────────
# Set DEMO_MODE to "false" when Langflow flow is ready
DEMO_MODE        = "true"
REQUEST_TIMEOUT  = "240"